---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: csi-driver-nfs-node
  namespace: csi-driver-nfs
spec:
  exceptions:
    # csi-nfs-node needs hostPID/hostNetwork, hostPath mounts, privileged mode,
    # and SYS_ADMIN to perform node-side NFS mounts. Resource-limit and
    # privilege-escalation policies are also exempted for the node plugin pods.
    - policyName: disallow-host-namespaces
      ruleNames:
        - deny-host-pid
        - autogen-deny-host-pid
    - policyName: disallow-privilege-escalation
      ruleNames:
        - deny-privilege-escalation
        - autogen-deny-privilege-escalation
    - policyName: restrict-capabilities
      ruleNames:
        - require-drop-all
        - autogen-require-drop-all
        - restrict-added-capabilities
        - autogen-restrict-added-capabilities
    - policyName: require-resources-limits
      ruleNames:
        - validate-resources
        - autogen-validate-resources
    - policyName: block-risky-capabilities
      ruleNames:
        - deny-privileged-containers
        - autogen-deny-privileged-containers
        - deny-host-network
        - autogen-deny-host-network
        - deny-host-path-volumes
        - autogen-deny-host-path-volumes
  match:
    any:
      - resources:
          kinds:
            - DaemonSet
          namespaces:
            - csi-driver-nfs
          names:
            - csi-nfs-node
      - resources:
          kinds:
            - Pod
          namespaces:
            - csi-driver-nfs
          names:
            - csi-nfs-node-*
