---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: csi-driver-nfs
spec:
  interval: 30m
  chart:
    spec:
      chart: csi-driver-nfs
      version: "4.13.4"
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
        namespace: flux-system
      interval: 30m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    kubeletDir: /var/lib/kubelet
    controller:
      # Only 1 schedulable worker (rishik-controller is cordoned), and the
      # controller uses hostNetwork=true, so a second replica can't coexist
      # on the same node (hostPort conflict). Bump to 2 once a second
      # worker is added.
      replicas: 1
    driver:
      mountPermissions: 0
    feature:
      enableFSGroupPolicy: true
    externalSnapshotter:
      enabled: false
