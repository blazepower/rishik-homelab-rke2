---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre-web
  namespace: media
spec:
  suspend: false
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 30m
  install:
    createNamespace: false
    remediation:
      retries: 3
    timeout: 15m
  upgrade:
    remediation:
      retries: 3
    timeout: 15m
  values:
    controllers:
      calibre-web:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: lscr.io/linuxserver/calibre-web
              # Pinned to 0.6.x — see docs/renovate-guardrails.md.
              # LinuxServer's real calibre-web release stream is 0.6.x
              # (current 0.6.26). The 5.x tags are orphaned 2021 pushes
              # with a broken OCI config (no ENTRYPOINT/CMD, amd64-only).
              # Semver-wise 5.x > 0.6.x so Renovate has re-selected them
              # twice already (PR #146 and PR #185). The
              # `allowedVersions: "<1.0.0"` rule in renovate.json now
              # prevents recurrence.
              tag: "0.6.26"
            env:
              - name: PUID
                valueFrom:
                  configMapKeyRef:
                    name: calibre-web-config
                    key: PUID
              - name: PGID
                valueFrom:
                  configMapKeyRef:
                    name: calibre-web-config
                    key: PGID
              - name: TZ
                valueFrom:
                  configMapKeyRef:
                    name: calibre-web-config
                    key: TZ
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              runAsNonRoot: false
              runAsUser: 0
              runAsGroup: 0
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
                  - SETUID
                  - SETGID
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"

    service:
      app:
        controller: calibre-web
        ports:
          http:
            port: 8083

    persistence:
      config:
        existingClaim: calibre-web-config
        globalMounts:
          - path: /config
      media-books:
        existingClaim: media-root
        globalMounts:
          - path: /media/books
            subPath: books

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
