---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 30m
  install:
    createNamespace: false
    remediation:
      retries: 3
    replace: true
    timeout: 15m
  upgrade:
    remediation:
      retries: 1
      strategy: uninstall
    timeout: 15m
  values:
    controllers:
      sonarr:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: lscr.io/linuxserver/sonarr
              tag: "4.0.16"
            env:
              - name: PUID
                valueFrom:
                  configMapKeyRef:
                    name: sonarr-config
                    key: PUID
              - name: PGID
                valueFrom:
                  configMapKeyRef:
                    name: sonarr-config
                    key: PGID
              - name: TZ
                valueFrom:
                  configMapKeyRef:
                    name: sonarr-config
                    key: TZ
              - name: SONARR__AUTHENTICATIONMETHOD
                value: "Forms"
              - name: SONARR__AUTHENTICATIONREQUIRED
                value: "DisabledForLocalAddresses"
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "1000m"
                memory: "1Gi"

    service:
      app:
        controller: sonarr
        ports:
          http:
            port: 8989

    persistence:
      config:
        existingClaim: sonarr-config
        globalMounts:
          - path: /config
      # Single persistence entry with multiple mounts so kubelet sees one
      # volume reference per pod (multiple entries pointing to the same PVC
      # cause WaitForAttachAndMount to hang — see plex-cutover-runbook).
      media:
        existingClaim: media-root
        globalMounts:
          - path: /media/TV Shows
            subPath: tv
          - path: /media/torrents
            subPath: downloads/torrents
