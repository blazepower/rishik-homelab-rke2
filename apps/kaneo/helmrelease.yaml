apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kaneo
  namespace: kaneo
spec:
  interval: 30m
  chart:
    spec:
      chart: charts/kaneo
      sourceRef:
        kind: GitRepository
        name: kaneo
        namespace: flux-system
      interval: 30m
  install:
    createNamespace: false
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    remediation:
      retries: 3
    timeout: 10m
  values:
    replicaCount: 1

    postgresql:
      enabled: true
      image:
        repository: postgres
        tag: 16-alpine
        pullPolicy: IfNotPresent
      auth:
        database: kaneo
        username: kaneo_user
        existingSecret: kaneo-credentials
        secretKeys:
          userPasswordKey: postgres-password
      persistence:
        enabled: true
        size: 8Gi
        storageClass: longhorn
        accessMode: ReadWriteOnce
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"

    api:
      image:
        repository: ghcr.io/usekaneo/api
        tag: "2.9.0"
        pullPolicy: IfNotPresent
      service:
        type: ClusterIP
        port: 1337
        targetPort: 1337
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
      livenessProbe:
        httpGet:
          path: /api/health
          port: 1337
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /api/health
          port: 1337
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 3
      env:
        existingSecret:
          enabled: true
          name: kaneo-credentials
          key: jwt-secret
        disableRegistration: false
        database:
          external:
            enabled: true
            host: kaneo-postgresql
            port: 5432
            database: kaneo
            username: kaneo_user
            existingSecret:
              enabled: true
              name: kaneo-credentials
              passwordKey: database-url

    web:
      image:
        repository: ghcr.io/usekaneo/web
        tag: "2.9.8"
        pullPolicy: IfNotPresent
      env:
        apiUrl: "https://kaneo.homelab"
      service:
        type: ClusterIP
        port: 80
        targetPort: 5173
      livenessProbe:
        httpGet:
          path: /
          port: 5173
        initialDelaySeconds: 120
        periodSeconds: 10
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /
          port: 5173
        initialDelaySeconds: 60
        periodSeconds: 10
        failureThreshold: 3
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"

    kaneo:
      env:
        clientUrl: "https://kaneo.homelab"
        corsOrigins: "https://kaneo.homelab"
        existingSecret:
          enabled: true
          name: kaneo-credentials
          key: jwt-secret
        disableRegistration: false
        database:
          external:
            enabled: true
            host: kaneo-postgresql
            port: 5432
            database: kaneo
            username: kaneo_user
            existingSecret:
              enabled: true
              name: kaneo-credentials
              passwordKey: database-url

    # Disable built-in ingress - we'll create our own for Traefik
    ingress:
      enabled: false

  # Patch the Kaneo monolith to consume the pre-encoded database URL secret.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: kaneo
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kaneo
              spec:
                template:
                  spec:
                    containers:
                      - name: kaneo
                        env:
                          - name: KANEO_POSTGRES_PASSWORD
                            $patch: delete
                          - name: AUTH_SECRET
                            value: null
                            valueFrom:
                              secretKeyRef:
                                name: kaneo-credentials
                                key: jwt-secret
                          - name: KANEO_CLIENT_URL
                            value: "https://kaneo.homelab"
                          - name: CORS_ORIGINS
                            value: "https://kaneo.homelab"
                          - name: DATABASE_URL
                            value: null
                            valueFrom:
                              secretKeyRef:
                                name: kaneo-credentials
                                key: database-url
